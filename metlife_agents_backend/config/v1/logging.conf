[loggers]
keys=root,metlife,uvicorn,uvicorn_error,uvicorn_access,sqlalchemy,httpx,httpcore,openai

[handlers]
keys=consoleHandler

[formatters]
keys=metlifeFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_metlife]
level=DEBUG
handlers=consoleHandler
qualname=metlife
propagate=0

[logger_uvicorn]
level=INFO
handlers=consoleHandler
qualname=uvicorn
propagate=0

[logger_uvicorn_error]
level=INFO
handlers=consoleHandler
qualname=uvicorn.error
propagate=0

[logger_uvicorn_access]
level=WARNING
handlers=consoleHandler
qualname=uvicorn.access
propagate=0

[logger_sqlalchemy]
level=WARNING
handlers=consoleHandler
qualname=sqlalchemy.engine
propagate=0

[logger_httpx]
level=WARNING
handlers=consoleHandler
qualname=httpx
propagate=0

[logger_httpcore]
level=WARNING
handlers=consoleHandler
qualname=httpcore
propagate=0

[logger_openai]
level=INFO
handlers=consoleHandler
qualname=openai
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=metlifeFormatter
args=(sys.stdout,)

[formatter_metlifeFormatter]
format=%(levelname)s: %(asctime)s - Process:%(process)d - [%(filename)s:%(lineno)d] - %(message)s
